<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Königsträsser Bierometer</title>

<script src="/socket.io/socket.io.js"></script>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Georgia, "Times New Roman", serif;
}

.overlay {
  position: fixed;
  inset: 0;
  background: transparent;
  pointer-events: none;
}

.rahmenbild {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}

.bierometer-leiste {
  position: absolute;
  left: 7%;
  right: 7%;
  bottom: 2.0%;

  height: 7%;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(8px, 1.2vw, 24px);

  color: #ffd400;
  font-weight: bold;
  white-space: nowrap;

  text-shadow:
    3px 3px 0 #000,
    -2px -2px 0 #000,
    0 0 12px #000,
    0 0 20px rgba(255, 210, 0, 0.7);
}

.titel {
  font-size: clamp(26px, 3.2vw, 62px);
  letter-spacing: 0.01em;
}

.block {
  display: flex;
  align-items: baseline;
  gap: 0.35em;
  font-size: clamp(22px, 2.7vw, 52px);
}

.label {
  color: #fff0a0;
  font-size: 0.78em;
}

.zahl {
  min-width: 3ch;
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: #ffd400;
}

.einheit {
  color: #fff0a0;
  font-size: 0.78em;
}

.pulse {
  animation: pulseGold 0.65s ease;
}

@keyframes pulseGold {
  0% {
    transform: scale(1);
    filter: brightness(1);
  }

  45% {
    transform: scale(1.05);
    filter: brightness(1.45) drop-shadow(0 0 18px gold);
  }

  100% {
    transform: scale(1);
    filter: brightness(1);
  }
}
</style>
</head>

<body>

<div class="overlay">
  <img class="rahmenbild" src="rahmen-original-transparent.png" alt="Bierometer Rahmen">

  <div class="bierometer-leiste" id="bierometerLeiste">
    <div class="titel">Bierometer</div>

    <div class="block">
      <span class="label">soll</span>
      <span class="zahl" id="sollValue">0</span>
      <span class="einheit">Liter</span>
    </div>

    <div class="block">
      <span class="label">ist</span>
      <span class="zahl" id="istValue">0</span>
      <span class="einheit">Liter</span>
    </div>
  </div>
</div>

<script>
const socket = io();

let targetPlan = 0;
let targetAnzeigeIst = 0;

let displayPlan = 0;
let displayIst = 0;

const sollValue = document.getElementById("sollValue");
const istValue = document.getElementById("istValue");
const bierometerLeiste = document.getElementById("bierometerLeiste");

function animatePlan(current, target) {
  const diff = target - current;

  if (Math.abs(diff) < 0.05) {
    return target;
  }

  return current + diff * 0.08;
}

function render() {
  displayPlan = animatePlan(displayPlan, targetPlan);

  const diff = targetAnzeigeIst - displayIst;

  if (Math.abs(diff) < 0.05) {
    displayIst = targetAnzeigeIst;
  } else {
    displayIst += diff * 0.15;
  }

  sollValue.textContent = Math.round(displayPlan);
istValue.textContent = displayIst.toLocaleString("de-DE", {
  minimumFractionDigits: 1,
  maximumFractionDigits: 1
});

  requestAnimationFrame(render);
}

let letzterEchterIst = 0;

socket.on("update", data => {
  if (typeof data.plan === "number") {
    targetPlan = data.plan;
  }

  if (typeof data.ist === "number") {
    if (data.ist > letzterEchterIst) {
      bierometerLeiste.classList.remove("pulse");
      void bierometerLeiste.offsetWidth;
      bierometerLeiste.classList.add("pulse");
    }

    letzterEchterIst = data.ist;
  }

  if (typeof data.anzeigeIst === "number") {
    targetAnzeigeIst = data.anzeigeIst;
  }
});

socket.on("reset", () => {
  targetPlan = 0;
  targetAnzeigeIst = 0;

  displayPlan = 0;
  displayIst = 0;

  sollValue.textContent = "0";
  istValue.textContent = "0";
});

render();
</script>

</body>
</html>
